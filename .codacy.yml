---
# Codacy static analysis (https://app.codacy.com/gh/dimmmmmmmer/freetunnel).
# Ignored paths apply globally; engine blocks tune individual tools.
exclude_paths:
  - 'ci-artifacts-latest/**'
  - 'tests/**'
  - '**/_deps/**'
  - '**/build*/**'

engines:
  cppcheck:
    language: c++
    # Codacy does not read cppcheck.cfg from the repo — pass flags here (extra_lines).
    extra_lines:
      - '--suppress=missingIncludeSystem'
      - '--suppress=unknownMacro'
      - '--suppress=passedByValue'
      - '--suppress=sizeofwithnumericparameter'
      - '--suppress=unusedStructMember'
      - '--inline-suppr'
      - '--library=qt'
  lizard:
    exclude_paths:
      - 'i18n/**'
      - 'src/vpn/**'
  metric:
    exclude_paths:
      - 'i18n/**'
      - 'src/vpn/**'
  duplication:
    exclude_paths:
      - 'i18n/**'

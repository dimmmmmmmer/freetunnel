---
# Codacy static analysis (https://app.codacy.com/gh/dimmmmmmmer/freetunnel).
# Tests are NOT globally excluded: cppcheck/pattern engines run over them so real
# bugs in test code are caught. They are kept out of the complexity/duplication
# metric engines below, where test scaffolding legitimately repeats itself.
exclude_paths:
  - 'ci-artifacts-latest/**'
  - 'tests/**/_*build*/**'
  - '**/_deps/**'
  - '**/build*/**'
  - 'docs/**'
  - 'i18n/**'
  - 'SECURITY.md'

languages:
  typescript:
    enabled: false
  javascript:
    enabled: false

engines:
  cppcheck:
    language: c++
    extra_lines:
      - "--suppress=missingInclude"
      - "--suppress=missingIncludeSystem"
      - "--suppress=unknownMacro"
      - "--suppress=passedByValue"
      - "--suppress=sizeofwithnumericparameter"
      - "--suppress=unusedStructMember"
      - "--suppress=functionStatic"
      - "--suppress=constParameter"
      - "--suppress=useStlAlgorithm"
      # Idiomatic for Qt Q_PROPERTY getters (and test mocks) to return by value.
      - "--suppress=returnByReference"
      - "--inline-suppr"
      - "--library=qt"
      - "-D__linux__"
      - "-I include"
      - "-I include/app"
      - "-I include/core"
      - "-I include/vpn"
      - "--std=c++20"
      - "--enable=warning,performance,portability"
  eslint-8:
    exclude_paths:
      - 'i18n/**'
  eslint-9:
    exclude_paths:
      - 'i18n/**'
  lizard:
    exclude_paths:
      - 'i18n/**'
      - 'tests/**'
  metric:
    exclude_paths:
      - 'i18n/**'
      - 'tests/**'
  duplication:
    exclude_paths:
      - 'i18n/**'
      - 'tests/**'

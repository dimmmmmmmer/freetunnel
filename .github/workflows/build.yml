name: Build

# Builds the FreeTunnel Qt client for Linux, macOS (arm64 + Intel) and Windows.
#
# The client is not self-contained: it links against the C++ VPN core from
# TrustTunnel/TrustTunnelClient (target `vpnlibs_trusttunnel`). The strategy is
# to check that repo out as `upstream/`, drop this repo into
# `upstream/FreeTunnel/`, then configure CMake from the upstream root so the
# upstream conan bootstrap runs and the `vpnlibs_trusttunnel` target exists.
#
# HTTP3/QUIC (quiche) is disabled for the release builds, which removes the Rust
# dependency from the core build. An optional HTTP/3 variant lives in
# build-http3.yml.
#
# Release binaries are UNSIGNED (no code-signing certs). macOS .app is ad-hoc
# signed so it launches after the user approves it in Gatekeeper; see the README.

# The repo is public, so Actions on standard runners are free — run the full
# Mac/Win/Linux matrix on PRs and main for continuous validation, plus on
# release tags (which also publish artifacts) and manual dispatch.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  UPSTREAM_REPO: TrustTunnel/TrustTunnelClient
  # Pinned ref in scripts/upstream_ref.txt (verified by scripts/verify_upstream_patch.sh).
  CONAN_VER: '2.12'
  # Opt JS actions onto Node 24 (silences the Node 20 deprecation warning for
  # actions without a Node 24 release yet, e.g. ilammy/msvc-dev-cmd).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # Rasterize the bundle icons (.icns/.ico/.png) from the neutral logo.svg on
  # Linux (where rsvg/icnsutils/ImageMagick are reliable) and share them with
  # every platform build, so the dock/taskbar/Finder icons match the in-app
  # monochrome logo. Best-effort: the builds fall back to the committed icons.
  icons:
    name: Render bundle icons
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install rasterizers
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin icnsutils imagemagick
      - name: Render icons from logo.svg
        run: bash scripts/render-icons.sh icons-out
      - uses: actions/upload-artifact@v7
        with:
          name: bundle-icons
          path: icons-out/

  build:
    name: Build (${{ matrix.artifact }})
    needs: icons
    strategy:
      fail-fast: false
      matrix:
        include:
          # Built on ubuntu-22.04 (glibc 2.35) so the .deb runs on most
          # current distros (Ubuntu 22.04+, Debian 12+, recent Fedora). Qt and a
          # modern clang come from aqt/llvm.sh, not the distro's old packages.
          - os: ubuntu-22.04
            platform: linux
            qt_host: linux
            qt_arch: linux_gcc_64
            artifact: freetunnel-linux-x86_64
          # Universal macOS: built on the Apple-Silicon runner; the x86_64 slice
          # is cross-compiled (Apple clang) and lipo-merged, so no Intel runner
          # is needed. Qt comes from aqt (clang_64 is a universal build).
          - os: macos-15
            platform: macos
            qt_host: mac
            qt_arch: clang_64
            artifact: freetunnel-macos-universal
          - os: windows-latest
            platform: windows
            qt_host: windows
            qt_arch: win64_msvc2022_64
            artifact: freetunnel-windows-x86_64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout client
        uses: actions/checkout@v7
        with:
          path: client

      # Drop the freshly-rendered neutral icons over the committed ones before
      # the client is injected into the upstream tree. Best-effort.
      - name: Use rendered bundle icons
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: bundle-icons
          path: client/assets

      - name: Build macOS .icns with iconutil
        if: matrix.platform == 'macos'
        run: iconutil -c icns client/assets/icon.iconset -o client/assets/logo.icns

      - name: Read pinned upstream ref
        id: upstream_ref
        shell: bash
        run: echo "value=$(tr -d '[:space:]' < client/scripts/upstream_ref.txt)" >> "$GITHUB_OUTPUT"

      - name: Checkout upstream core (${{ env.UPSTREAM_REPO }})
        uses: actions/checkout@v7
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ steps.upstream_ref.outputs.value }}
          path: upstream
          # Full history + tags so `git describe --tags` can resolve the core to
          # a version tag (not just the short commit) for the About footer.
          fetch-depth: 0
          fetch-tags: true

      - name: Inject client into upstream tree
        shell: bash
        run: |
          set -eux
          rm -rf upstream/FreeTunnel
          mkdir -p upstream/FreeTunnel
          (cd client && tar --exclude='./.git' -cf - .) | (cd upstream/FreeTunnel && tar -xf -)
          {
            printf '\n# --- injected by FreeTunnel CI ---\n'
            printf 'if (BUILD_TRUSTTUNNEL_QT AND EXISTS "${CMAKE_CURRENT_SOURCE_DIR}/FreeTunnel/CMakeLists.txt")\n'
            printf '    add_subdirectory(FreeTunnel)\n'
            printf 'endif ()\n'
          } >> upstream/CMakeLists.txt
          test -f upstream/conanfile.py
          test -f upstream/requirements.txt

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Patch core wrapper (surface tunnel stats)
        shell: bash
        run: python3 client/scripts/patch_core_wrapper.py upstream

      # ---------------------------------------------------------------- Linux
      - name: Install dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          # Modern clang (the core is clang-only; 22.04's default clang is too old).
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          # gcc-13 libstdc++ headers: 22.04's gcc-12 libstdc++ misses some
          # transitive includes the core relies on (e.g. <algorithm>); clang-18
          # auto-selects the newest GCC, matching what works on ubuntu-24.04.
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y g++-13
          # ninja and the X/GL libs Qt's platform plugin needs so linuxdeploy
          # can find and bundle them into the .deb.
          sudo apt-get install -y ninja-build libfuse2 libbsd-dev \
            libgl1-mesa-dev libxkbcommon-dev libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-xinerama0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb1-dev libx11-dev libx11-xcb-dev # QHotkey builds against xcb/X11
          pip install -r upstream/requirements.txt
          pip install "conan~=${CONAN_VER}"

      # ---------------------------------------------------------------- macOS
      - name: Install dependencies (macOS)
        if: matrix.platform == 'macos'
        run: |
          # Target macOS 11 (Big Sur, first Apple-Silicon release) for broad
          # compatibility. Set early so conan-built deps and the app share it.
          echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"
          # The runner ships preinstalled aws/azure taps that Homebrew now warns
          # are "not trusted"; we don't use them, so drop them to silence it.
          brew untap aws/tap azure/bicep 2>/dev/null || true
          # ninja is preinstalled on the macOS runner; only install if missing.
          brew list ninja >/dev/null 2>&1 || brew install ninja
          pip install -r upstream/requirements.txt
          pip install "conan~=${CONAN_VER}"

      # -------------------------------------------------------------- Windows
      - name: Set up MSVC (Windows)
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: x64

      # Qt via aqt for all platforms: Linux (gcc_64), macOS (universal clang_64),
      # Windows (MSVC). Keeps the Qt version consistent and lets the Linux
      # .deb bundle a modern Qt regardless of the distro.
      - name: Install Qt (aqt)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: ${{ matrix.qt_host }}
          target: desktop
          arch: ${{ matrix.qt_arch }}
          cache: true

      - name: Install dependencies (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          # ninja is preinstalled on windows-latest; installing it again warns.
          choco install -y strawberryperl nasm nsis
          pip install -r upstream/requirements.txt
          pip install "conan~=$env:CONAN_VER"

      # ------------------------------------------------------------- Caching
      - name: ccache
        if: matrix.platform != 'windows'
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          # Key includes the runner OS so deps/objects built against one glibc
          # are never reused on another (e.g. ubuntu-24.04 -> ubuntu-22.04).
          key: ${{ matrix.os }}-${{ matrix.artifact }}-ccache

      - name: Conan cache
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: ${{ matrix.os }}-${{ matrix.artifact }}-conan2-${{ hashFiles('upstream/conanfile.py') }}
          restore-keys: ${{ matrix.os }}-${{ matrix.artifact }}-conan2-

      - name: Patch bootstrap for Windows (run .sh via sh)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          set -eux
          sed -i 's/subprocess\.run(\[os\.path\.join(/subprocess.run(["sh", os.path.join(/g' \
            upstream/scripts/bootstrap_conan_deps.py

      - name: Bootstrap conan dependencies
        working-directory: upstream
        shell: bash
        run: ./scripts/bootstrap_conan_deps.py

      - name: Prepare conan profile and pin AdGuard deps
        shell: bash
        run: |
          set -eux
          conan profile detect --force
          # The upstream bootstrap exports the *latest* DnsLibs tag, which can drift
          # ahead of the version pinned in conanfile.py. Export the exact one.
          DNS_VER=$(grep -oE 'dns-libs/[0-9]+\.[0-9]+\.[0-9]+@adguard/oss' \
            upstream/conanfile.py | head -1 | sed -E 's#dns-libs/([0-9.]+)@.*#\1#')
          echo "pinned dns-libs=${DNS_VER}"
          rm -rf _dnslibs
          git clone --depth 1 --branch "v${DNS_VER}" \
            https://github.com/AdguardTeam/DnsLibs.git _dnslibs
          conan export _dnslibs --user adguard --channel oss --version "${DNS_VER}"
          rm -rf _dnslibs

      # ----------------------------------------------------------- Configure
      - name: Configure (Linux)
        if: matrix.platform == 'linux'
        run: |
          # clang-18 from llvm.sh (upstream is clang-only; gcc trips -Werror=extra)
          # with libstdc++; Qt comes from aqt ($QT_ROOT_DIR).
          cmake -S upstream -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER=clang-18 -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DIPV6_UNAVAILABLE=ON -DDISABLE_HTTP3=ON \
            -DCMAKE_DISABLE_FIND_PACKAGE_quiche=ON -DBUILD_TRUSTTUNNEL_QT=ON \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR" \
            -DCMAKE_EXE_LINKER_FLAGS="-Wl,--copy-dt-needed-entries"

      # macOS configures/builds both arches in the universal step below.

      - name: Configure (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          cmake -S upstream -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl `
            -DIPV6_UNAVAILABLE=ON -DDISABLE_HTTP3=ON `
            -DCMAKE_DISABLE_FIND_PACKAGE_quiche=ON -DBUILD_TRUSTTUNNEL_QT=ON `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"

      # --------------------------------------------------------------- Build
      - name: Build
        if: matrix.platform != 'macos'
        run: cmake --build build --target FreeTunnel --config RelWithDebInfo -j 4

      - name: Compute version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=1.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      # ------------------------------------------------------------- Package
      - name: Prepare Linux bundle
        if: matrix.platform == 'linux'
        run: |
          set -eux
          mkdir -p out
          export ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 QMAKE="$QT_ROOT_DIR/bin/qmake"
          export QML_SOURCES_PATHS="$PWD/client/qml"
          ld=linuxdeploy-x86_64.AppImage
          ldqt=linuxdeploy-plugin-qt-x86_64.AppImage
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/$ld"
          wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/$ldqt"
          chmod +x "$ld" "$ldqt"
          rm -rf AppDir && mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp build/FreeTunnel/FreeTunnel AppDir/usr/bin/
          cp client/assets/logo-256.png AppDir/usr/share/icons/hicolor/256x256/apps/freetunnel.png
          printf '%s\n' \
            '[Desktop Entry]' 'Type=Application' 'Name=FreeTunnel' \
            'Exec=FreeTunnel %u' 'Icon=freetunnel' 'Categories=Network;' 'Terminal=false' \
            'MimeType=x-scheme-handler/freetunnel;x-scheme-handler/tt;' \
            > AppDir/usr/share/applications/freetunnel.desktop
          PATH="$PWD:$PATH" ./"$ld" --appdir AppDir --plugin qt \
            --desktop-file AppDir/usr/share/applications/freetunnel.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/freetunnel.png \
            --library "$(g++-13 -print-file-name=libstdc++.so.6)" \
            --library "$(g++-13 -print-file-name=libgcc_s.so.1)"

      # .deb for Debian/Ubuntu/Pop!_OS. Self-contained: ships the bundled
      # runtime (binary + Qt libs/plugins/qml) from linuxdeploy's AppDir under
      # /opt/freetunnel. A /usr/bin symlink + .desktop entry integrate it into
      # the launcher; the privileged VPN helper runs via pkexec (polkit).
      - name: Package .deb (Linux)
        if: matrix.platform == 'linux'
        run: |
          set -eux
          if [ ! -x AppDir/usr/bin/FreeTunnel ]; then
            echo "::error::AppDir missing — cannot build .deb"
            exit 1
          fi
          ver="${{ steps.ver.outputs.version }}"
          root=debpkg
          rm -rf "$root"
          mkdir -p "$root/opt/freetunnel" "$root/usr/bin" \
                   "$root/usr/share/applications" \
                   "$root/usr/share/pixmaps" \
                   "$root/usr/share/icons/hicolor/256x256/apps" \
                   "$root/DEBIAN"
          # Bundled runtime (binary + Qt libs/plugins/qml + qt.conf).
          cp -a AppDir/usr/. "$root/opt/freetunnel/"
          # Launcher on PATH (rpath is $ORIGIN/../lib, so the symlink works).
          ln -sf /opt/freetunnel/bin/FreeTunnel "$root/usr/bin/freetunnel"
          # Menu entry + icons (multiple sizes for launchers / software centers).
          for s in 48 128 256 512; do
            mkdir -p "$root/usr/share/icons/hicolor/${s}x${s}/apps"
            cp "client/assets/logo-${s}.png" \
              "$root/usr/share/icons/hicolor/${s}x${s}/apps/freetunnel.png"
          done
          cp client/assets/logo-256.png \
            "$root/usr/share/pixmaps/freetunnel.png"
          printf '%s\n' \
            '[Desktop Entry]' 'Type=Application' 'Name=FreeTunnel' \
            'Exec=freetunnel %u' 'Icon=freetunnel' 'Categories=Network;' 'Terminal=false' \
            'MimeType=x-scheme-handler/freetunnel;x-scheme-handler/tt;' \
            > "$root/usr/share/applications/freetunnel.desktop"
          installed_kb=$(du -sk "$root" | cut -f1)
          cat > "$root/DEBIAN/control" <<EOF
          Package: freetunnel
          Version: ${ver}
          Section: net
          Priority: optional
          Architecture: amd64
          Maintainer: FreeTunnel <noreply@freetunnel.app>
          Installed-Size: ${installed_kb}
          Depends: libc6, libgl1, libxkbcommon0, libxcb-cursor0, policykit-1 | polkit
          Description: FreeTunnel VPN client
           A simple, modern desktop client for the TrustTunnel VPN core.
           Bundles its own Qt runtime; the privileged VPN helper is started on
           demand via pkexec (polkit).
          EOF
          cat > "$root/DEBIAN/postinst" <<'EOF'
          #!/bin/sh
          set -e
          command -v update-desktop-database >/dev/null 2>&1 && \
            update-desktop-database -q /usr/share/applications || true
          command -v gtk-update-icon-cache >/dev/null 2>&1 && \
            gtk-update-icon-cache -q -t -f /usr/share/icons/hicolor || true
          exit 0
          EOF
          chmod 0755 "$root/DEBIAN/postinst"
          dpkg-deb --build --root-owner-group "$root" \
            "out/${{ matrix.artifact }}.deb"
          ls -la out

      - name: Build & package universal (macOS)
        if: matrix.platform == 'macos'
        run: |
          set -eux
          common=(-S upstream -G Ninja
            -DCMAKE_BUILD_TYPE=RelWithDebInfo
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
            -DIPV6_UNAVAILABLE=ON -DDISABLE_HTTP3=ON
            -DCMAKE_DISABLE_FIND_PACKAGE_quiche=ON -DBUILD_TRUSTTUNNEL_QT=ON
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR")

          # The core deps include quiche (Rust); cross-building the x86_64 slice
          # needs that Rust target installed (the runner only has the native one).
          rustup target add x86_64-apple-darwin

          # arm64 (native) and x86_64 (cross-compiled by Apple clang).
          cmake "${common[@]}" -B build-arm64 -DCMAKE_OSX_ARCHITECTURES=arm64
          cmake --build build-arm64 --target FreeTunnel -j3
          cmake "${common[@]}" -B build-x64 -DCMAKE_OSX_ARCHITECTURES=x86_64
          cmake --build build-x64 --target FreeTunnel -j3

          # Merge the two slices into a universal binary inside the arm64 bundle.
          APP=build-arm64/FreeTunnel/FreeTunnel.app
          lipo -create \
            build-arm64/FreeTunnel/FreeTunnel.app/Contents/MacOS/FreeTunnel \
            build-x64/FreeTunnel/FreeTunnel.app/Contents/MacOS/FreeTunnel \
            -output "$APP/Contents/MacOS/FreeTunnel"
          lipo -info "$APP/Contents/MacOS/FreeTunnel"

          "$QT_ROOT_DIR/bin/macdeployqt" "$APP" -always-overwrite -qmldir=client/qml
          cp client/assets/logo.icns "$APP/Contents/Resources/logo.icns"
          # Ad-hoc sign so the bundle launches once the user approves it in
          # Gatekeeper (no Developer ID available for full signing/notarization).
          codesign --force --deep --sign - "$APP" || true
          mkdir -p out
          RW=out/rw.dmg
          hdiutil create -volname "FreeTunnel" -srcfolder "$APP" -size 200m -ov -format UDRW "$RW"
          MOUNT=$(hdiutil attach -readwrite -noverify -noautofsck "$RW" | awk '/\/Volumes\// {print $NF; exit}')
          cp client/assets/logo.icns "$MOUNT/.VolumeIcon.icns"
          SetFile -a C "$MOUNT/.VolumeIcon.icns"
          ln -sf /Applications "$MOUNT/Applications"
          bless --folder "$MOUNT" --openfolder "$MOUNT" --icon "$MOUNT/.VolumeIcon.icns" || true
          hdiutil detach "$MOUNT"
          hdiutil convert "$RW" -format UDZO -imagekey zlib-level=9 -o out/${{ matrix.artifact }}.dmg
          rm -f "$RW"

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $bin = "build\FreeTunnel"
          $exe = Get-ChildItem -Path $bin -Recurse -Filter FreeTunnel.exe | Select-Object -First 1
          $deploy = Join-Path $env:QT_ROOT_DIR "bin\windeployqt.exe"
          New-Item -ItemType Directory -Force -Path dist, out | Out-Null
          Copy-Item $exe.FullName dist\
          if (Test-Path "$bin\assets") { Copy-Item "$bin\assets" dist\assets -Recurse }
          New-Item -ItemType Directory -Force -Path dist\assets | Out-Null
          Copy-Item client\assets\logo.ico dist\assets\ -Force
          Copy-Item client\assets\logo.png dist\assets\ -Force -ErrorAction SilentlyContinue
          & $deploy --release --no-translations --qmldir client\qml dist\FreeTunnel.exe

          $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $nsis)) { throw "NSIS not found at $nsis" }
          $distAbs = (Resolve-Path dist).Path
          & $nsis "/DBUILD_DIR=$distAbs" "/DPRODUCT_VERSION=${{ steps.ver.outputs.version }}" client\win\installer.nsi
          $setup = Get-ChildItem -Path "client\win" -Filter "FreeTunnel-*-Setup.exe" | Select-Object -First 1
          if (-not $setup) { throw "NSIS did not produce FreeTunnel-*-Setup.exe" }
          Move-Item $setup.FullName "out\${{ matrix.artifact }}-Setup.exe" -Force
          ls out

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: out/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      # Publish SHA256 checksums so users can verify the (unsigned) downloads.
      # Names match the release asset names (basenames), which is what GitHub
      # exposes once the nested artifact folders are flattened.
      - name: Generate checksums
        run: |
          set -eux
          cd artifacts
          find . -type f ! -name 'SHA256SUMS.txt' -exec sha256sum {} + \
            | awk '{ n=$2; sub(/.*\//,"",n); print $1"  "n }' \
            | sort -k2 > SHA256SUMS.txt
          cat SHA256SUMS.txt

      # Sign the manifest with the Ed25519 release key so the in-app updater can
      # verify it against the public key compiled into the binary.
      # Set the ED25519_SIGNING_KEY repo secret to a PEM private key to enable.
      - name: Sign checksums
        env:
          ED25519_SIGNING_KEY: ${{ secrets.ED25519_SIGNING_KEY }}
        run: |
          set -eux
          if [ -z "${ED25519_SIGNING_KEY:-}" ]; then
            echo "ED25519_SIGNING_KEY not configured — skipping in-app signature"
            exit 0
          fi
          cd artifacts
          printf '%s' "$ED25519_SIGNING_KEY" > ed25519.pem
          openssl pkeyutl -sign -inkey ed25519.pem -rawin -in SHA256SUMS.txt -out SHA256SUMS.txt.sig
          rm -f ed25519.pem
          ls -la SHA256SUMS.txt.sig

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/**/*
            artifacts/SHA256SUMS.txt
          generate_release_notes: true
          body: |
            Builds are unsigned (see README for first-run notes).

            - **Linux**: install the **.deb** on Debian/Ubuntu/Pop!_OS
              (`sudo apt install ./freetunnel-linux-x86_64.deb`) — it bundles its
              own Qt and integrates into the app menu.
            - **macOS**: the app is ad-hoc signed but not notarized. On first launch
              right-click the app → Open (or run
              `xattr -dr com.apple.quarantine /Applications/FreeTunnel.app`).
            - **Windows**: SmartScreen may warn — choose "More info" → "Run anyway".

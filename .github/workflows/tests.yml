name: Tests

# Fast, core-independent unit tests (Qt only — no conan/VPN core), so they give
# quick feedback on every push/PR without the heavy native build.

on:
  push:
    branches: [main, feat/qml]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Qt (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev \
            qt6-base-dev qt6-declarative-dev \
            qml6-module-qtquick qml6-module-qtquick-layouts \
            qml6-module-qtquick-window qml6-module-qtquick-effects \
            qml6-module-qt-labs-platform qml6-module-qtqml-workerscript

      - name: Install Qt (macOS)
        if: runner.os == 'macOS'
        run: |
          brew list ninja >/dev/null 2>&1 || brew install ninja
          brew list qt >/dev/null 2>&1 || brew install qt
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt)" >> "$GITHUB_ENV"

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: x64

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true

      - name: Configure
        run: cmake -S tests -B build-tests -G Ninja

      - name: Build
        run: cmake --build build-tests -j

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build-tests --output-on-failure

name: Tests

# Fast, core-independent unit tests (Qt only — no conan/VPN core), so they give
# quick feedback on every push/PR without the heavy native build.

on:
  push:
    branches: [main, feat/qml]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev libsecret-1-dev pkg-config

      - name: Install Qt (Linux)
        if: runner.os == 'Linux'
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4
        with:
          version: '6.8.*'
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - name: Install Qt (macOS)
        if: runner.os == 'macOS'
        run: |
          brew list ninja >/dev/null 2>&1 || brew install ninja
          brew list qt >/dev/null 2>&1 || brew install qt
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt)" >> "$GITHUB_ENV"

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
        with:
          arch: x64

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4
        with:
          version: '6.8.*'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true

      - name: Configure
        run: cmake -S tests -B build-tests -G Ninja

      - name: Build
        run: cmake --build build-tests -j

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build-tests -j1 --output-on-failure

  coverage:
    name: Coverage (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev libsecret-1-dev pkg-config lcov

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4
        with:
          version: '6.8.*'
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - name: Build, test, and report coverage
        env:
          QT_QPA_PLATFORM: offscreen
        run: bash scripts/coverage-report.sh build-coverage coverage-out

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report
          path: coverage-out/
          if-no-files-found: error

      - name: Upload coverage to Codacy
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          if [ -z "${CODACY_PROJECT_TOKEN:-}" ]; then
            echo "CODACY_PROJECT_TOKEN not configured — skipping Codacy coverage upload"
            exit 0
          fi
          bash <(curl -Ls https://coverage.codacy.com/get.sh) report \
            -r coverage-out/coverage.filtered.info

  sanitizers:
    name: ASan+UBSan (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev libsecret-1-dev pkg-config

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4
        with:
          version: '6.8.*'
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - name: Configure
        run: cmake -S tests -B build-asan -G Ninja -DFT_ENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build-asan -j

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
          ASAN_OPTIONS: detect_leaks=0:allocator_may_return_null=1
          UBSAN_OPTIONS: print_stacktrace=1
        run: ctest --test-dir build-asan -j1 --output-on-failure

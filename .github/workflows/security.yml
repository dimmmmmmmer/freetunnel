name: Security

# Static analysis and dependency hygiene. Keeps feedback fast — no VPN core build.

on:
  push:
    branches: [main, feat/qml]
  pull_request:
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          set -eux
          cppcheck --error-exitcode=1 \
            --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            --suppress=unknownMacro \
            --suppress=passedByValue \
            --suppress=sizeofwithnumericparameter \
            --inline-suppr \
            --library=qt \
            -I include -I include/app -I include/core -I include/vpn \
            src

  upstream-patch:
    name: upstream patch verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify telemetry patch applies to pinned upstream
        run: bash scripts/verify_upstream_patch.sh

  dependency-review:
    name: dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v4

  i18n:
    name: i18n catalog freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Qt linguist tools
        run: sudo apt-get update && sudo apt-get install -y qt6-l10n-tools

      - name: Verify translation catalog is up to date
        run: bash scripts/i18n-verify.sh

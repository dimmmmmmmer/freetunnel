name: Security

# Static analysis and dependency hygiene. Keeps feedback fast — no VPN core build.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          set -eux
          cppcheck --error-exitcode=1 \
            --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            --suppress=unknownMacro \
            --suppress=passedByValue \
            --suppress=sizeofwithnumericparameter \
            --inline-suppr \
            --library=qt \
            -I include -I include/app -I include/core -I include/vpn \
            include src

  pinned-deps:
    name: pinned dependency refs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Verify pinned upstream and FetchContent tags
        run: bash scripts/check-pinned-deps.sh

  dependency-review:
    name: dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-tidy libssl-dev libsecret-1-dev pkg-config

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4
        with:
          version: '6.8.*'
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - name: Run clang-tidy
        run: bash scripts/run-clang-tidy.sh build-tidy

  upstream-patch:
    name: upstream patch verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Verify telemetry patch applies to pinned upstream
        run: bash scripts/verify_upstream_patch.sh

  i18n:
    name: i18n catalog freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Qt linguist tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-l10n-tools
          # Debian/Ubuntu ship lupdate under /usr/lib/qt6/bin — put it on PATH.
          echo "/usr/lib/qt6/bin" >> "$GITHUB_PATH"

      - name: Verify translation catalog is up to date
        run: bash scripts/i18n-verify.sh
